spring:
  config:
    activate:
      on-profile: prod

govos:
  search:
    semantic:
      vector-store: opensearch
      embedding-cache:
        enabled: true
    cache:
      warm-on-startup: true
    pool:
      max-connections: 100
      max-connections-per-route: 50

logging:
  level:
    root: WARN
    com.govos: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
