spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.govos: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
