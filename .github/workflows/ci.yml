name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and verify
        run: ./mvnw -pl govos-api -am clean verify -B
